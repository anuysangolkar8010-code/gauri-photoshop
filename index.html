<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gauri Photo Shop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .banner {
            background: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYnYDZTv7kvmxoXOPlTOTsERBecKEmyM9CPg&s) no-repeat center;
            background-size: cover;
            height: 300px;
            color: white;
            text-align: center;
            padding-top: 100px;
            font-size: 30px;
            font-weight: bold;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .gallery img {
            width: 250px;
            height: 200px;
            margin: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        .contact {
            background: #f4f4f4;
            padding: 20px;
            text-align: center;
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
